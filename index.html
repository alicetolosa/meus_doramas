<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Doramas</title>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Ícones simples (Lucide ou FontAwesome) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- HEADER / NAV -->
  <header class="navbar">
    <div class="logo">
      <i class="heart-icon">💜</i> Meus Doramas
    </div>
    <nav class="nav-links">
      <a href="#" class="active">Início</a>
      <a href="sobre.html">Sobre</a>
    </nav>
    <div class="nav-actions">
      <div class="search-box">
        
      </div>
      <div class="profile-icon">🍜</div>
    </div>
  </header>

  <!-- Hero / Destaque -->
  <section id="main-hero" class="hero" style="background-image: linear-gradient(to top, #0b0c10, rgba(11, 12, 16, 0.4)), url('assets/images/advogada-extraordinaria.jpg');">
    <div class="hero-content">
      <h1 id="hero-title" class="hero-title">Uma Advogada <span class="highlight">Extraordinária</span></h1>
      <p id="hero-description" class="hero-description">
        Uma advogada determinada enfrenta desafios no mundo jurídico enquanto luta por justiça e defende os direitos dos oprimidos.
      </p>

      <div class="hero-meta">
        <span id="hero-rating">★ 10.0</span>
        <span id="hero-year">• 2022</span>
        <span class="age-rating">12</span>
        <span id="hero-episodes">• 16 episódios</span>
        <span id="hero-genres">• Drama, Jurídico, Comédia, Romance</span>
      </div>
    </div>
    
   
  </section>

  <!-- SEÇÕES -->
  <main class="container">
    <section class="row-section">
      <h2 class="section-title">Assistidos</h2>
      <div class="carousel-container">
        <button class="carousel-btn prev">❮</button>
        
        <!-- preenchido pelo Js de forma automática -->
        <div class="cards-grid" id="cards-container"></div>

        <button class="carousel-btn next">❯</button>
      </div>
    </section>

    <!-- Categorias  
    <section class="row-section">
      <h2 class="section-title">Categorias</h2>
      <div class="categories-grid">
        <div class="category-item">💜 Romance</div>
        <div class="category-item">😄 Comédia</div>
        <div class="category-item">🎭 Drama</div>
        <div class="category-item">⚡ Ação</div>
        <div class="category-item">🔍 Suspense</div>
        <div class="category-item">⭐ Fantasia</div>
        <div class="category-item">🎛 Ver todas</div>
      </div>
    </section>
    -->
  </main>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
